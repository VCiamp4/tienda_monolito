server:
  port: 8080

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/tienda_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

firebase:
  credentials-path: ${FIREBASE_CREDENTIALS_PATH:firebase-service-account.json}
  project-id: ${FIREBASE_PROJECT_ID:your-firebase-project-id}

app:
  wallet:
    max-carga: ${WALLET_MAX_CARGA:100000}
    moneda: ${WALLET_MONEDA:ARS}
  search:
    max-results: ${SEARCH_MAX_RESULTS:50}
  security:
    max-login-attempts: ${MAX_LOGIN_ATTEMPTS:5}
    session-timeout-minutes: ${SESSION_TIMEOUT_MINUTES:60}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
